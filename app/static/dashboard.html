<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Scheduler</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:#f5f5f7;
  color:#1d1d1f;
}

/* NAV */
nav {
  background:#fff;
  border-bottom:1px solid #e5e5e7;
  padding:0 20px;
  height:55px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-brand { font-weight:600; }
.nav-brand span { color:#0071e3; }

.owner { font-size:12px; background:#e8f0fe; padding:5px 10px; border-radius:12px; }

/* LAYOUT */
.layout { display:flex; height:calc(100vh - 55px); }

/* SIDEBAR */
aside {
  width:220px;
  background:#fff;
  border-right:1px solid #e5e5e7;
  padding:20px;
}

.sidebar-label {
  font-size:11px;
  color:#86868b;
  margin-bottom:8px;
  text-transform:uppercase;
}

.nav-item {
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
.nav-item:hover { background:#f0f0f2; }
.nav-item.active { background:#e8f0fe; color:#0071e3; }

/* MAIN */
main {
  flex:1;
  padding:25px;
  overflow:auto;
}

/* BUTTONS */
.btn {
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.btn-primary { background:#0071e3; color:#fff; }
.btn-secondary { background:#eee; }
.btn-danger { background:#ffe5e4; color:#ff3b30; }

/* METRICS */
.metrics {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:20px;
}

.metric {
  background:#fff;
  padding:15px;
  border-radius:12px;
  border:1px solid #e5e5e7;
}

.metric h3 { font-size:22px; }

/* TASK */
.task {
  background:#fff;
  padding:15px;
  border-radius:12px;
  border:1px solid #e5e5e7;
  margin-bottom:10px;
}

.task-top {
  display:flex;
  justify-content:space-between;
}

.badge {
  font-size:11px;
  padding:3px 8px;
  border-radius:10px;
}

.pending { background:#fff3e0; }
.completed { background:#e8f5e9; }

/* MODAL */
.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal-overlay.open { display:flex; }

.modal {
  background:#fff;
  padding:20px;
  border-radius:14px;
  width:400px;
  animation: pop 0.2s ease;
}

@keyframes pop {
  from { transform: scale(0.95); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

/* TOAST */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1d1d1f;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
}

/* INPUTS */
input, textarea, select {
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<nav>
  <div class="nav-brand">Task<span>Scheduler</span></div>
  <div class="owner" id="owner-display">tiya_001</div>
</nav>

<div class="layout">

<aside>
  <div class="sidebar-label">Views</div>
  <div class="nav-item active" onclick="showView('dashboard')">Dashboard</div>
  <div class="nav-item" onclick="showView('tasks')">Tasks</div>

  <br>

  <div class="sidebar-label">Actions</div>
  <div class="nav-item" onclick="openCreateModal()">+ New Task</div>

  <br>

  <div class="sidebar-label">Owner</div>
  <input id="sidebar-owner" value="tiya_001" oninput="updateOwner(this.value)">
  <button class="btn btn-secondary" onclick="loadAll()">Load</button>
</aside>

<main>

<!-- DASHBOARD -->
<div id="view-dashboard">
  <h2>Dashboard</h2>
  <br>

  <div class="metrics">
    <div class="metric">
      <div>Total</div>
      <h3 id="m-total">0</h3>
    </div>
    <div class="metric">
      <div>Pending</div>
      <h3 id="m-pending">0</h3>
    </div>
    <div class="metric">
      <div>Completed</div>
      <h3 id="m-completed">0</h3>
    </div>
  </div>

  <button class="btn btn-primary" onclick="openCreateModal()">+ New Task</button>

  <br><br>

  <h3>Recent Tasks</h3>
  <div id="recent-tasks"></div>
</div>

<!-- TASKS -->
<div id="view-tasks" style="display:none">
  <h2>All Tasks</h2>
  <br>
  <div id="tasks-list"></div>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h3>Create Task</h3>

    <input id="f-title" placeholder="Title">
    <textarea id="f-desc" placeholder="Description"></textarea>
    <input id="f-owner">
    <input id="f-deadline" type="datetime-local">

    <select id="f-priority">
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>

    <button class="btn btn-primary" onclick="createTask()">Create</button>
    <button class="btn" onclick="closeCreateModal()">Cancel</button>
  </div>
</div>

<script>
const API = "http://localhost:8000";

let currentOwner = "tiya_001";
let allTasks = [];

/* UI */
function showView(v){
  document.getElementById("view-dashboard").style.display = v==="dashboard"?"block":"none";
  document.getElementById("view-tasks").style.display = v==="tasks"?"block":"none";
}

function updateOwner(val){
  currentOwner = val;
  document.getElementById("owner-display").innerText = val;
}

function openCreateModal(){
  document.getElementById("create-modal").classList.add("open");
  document.getElementById("f-owner").value = currentOwner;
}

function closeCreateModal(){
  document.getElementById("create-modal").classList.remove("open");
}

/* click outside modal */
document.getElementById("create-modal").onclick = function(e){
  if(e.target === this) closeCreateModal();
};

/* TOAST */
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

/* API */
async function apiFetch(method, path, body){
  try{
    const res = await fetch(API+path,{
      method,
      headers:{'Content-Type':'application/json'},
      body: body?JSON.stringify(body):undefined
    });
    return await res.json();
  }catch{
    alert("API error");
    return null;
  }
}

/* LOAD */
async function loadTasks(){
  const data = await apiFetch("GET", `/tasks?owner_id=${currentOwner}`);
  if(!data) return;

  allTasks = data.tasks || [];

  updateMetrics();
  renderTasks();
  renderRecent();
}

function updateMetrics(){
  const total = allTasks.length;
  const completed = allTasks.filter(t=>t.status==="completed").length;

  document.getElementById("m-total").innerText = total;
  document.getElementById("m-completed").innerText = completed;
  document.getElementById("m-pending").innerText = total-completed;
}

/* CREATE (FIXED) */
async function createTask(){
  const title = document.getElementById("f-title").value.trim();
  const owner = document.getElementById("f-owner").value.trim();
  const deadline = document.getElementById("f-deadline").value;

  if(!title || !owner || !deadline){
    alert("Missing fields");
    return;
  }

  const res = await apiFetch("POST","/tasks",{
    title,
    owner_id: owner,
    deadline: new Date(deadline).toISOString(),
    priority: document.getElementById("f-priority").value,
    description: document.getElementById("f-desc").value
  });

  if(res){
    closeCreateModal();
    loadTasks();
    toast("Task created ✅");
  }
}

/* ACTIONS */
async function completeTask(id){
  await apiFetch("POST",`/tasks/${id}/complete`);
  loadTasks();
  toast("Completed");
}

async function deleteTask(id){
  await apiFetch("DELETE",`/tasks/${id}`);
  loadTasks();
  toast("Deleted");
}

/* RENDER */
function renderTasks(){
  const el = document.getElementById("tasks-list");

  if(!allTasks.length){
    el.innerHTML="No tasks";
    return;
  }

  el.innerHTML = allTasks.map(t=>`
    <div class="task">
      <div class="task-top">
        <div>
          <div style="font-weight:600">${t.title}</div>
          <div style="font-size:12px;color:#86868b">
            ${t.description || "No description"}
          </div>
        </div>
        <span class="badge ${t.status}">${t.status}</span>
      </div>

      <div style="margin-top:10px;font-size:12px;color:#86868b">
        Due: ${new Date(t.deadline).toLocaleString()}
      </div>

      <div style="margin-top:10px">
        <button class="btn btn-secondary" onclick="completeTask('${t.id}')">✓</button>
        <button class="btn btn-danger" onclick="deleteTask('${t.id}')">Delete</button>
      </div>
    </div>
  `).join("");
}

function renderRecent(){
  const el = document.getElementById("recent-tasks");

  if(!allTasks.length){
    el.innerHTML="No tasks";
    return;
  }

  el.innerHTML = allTasks.slice(0,5).map(t=>`
    <div class="task">${t.title}</div>
  `).join("");
}

/* INIT */
function loadAll(){ loadTasks(); }

setInterval(loadTasks, 5000);

loadAll();
</script>

</body>
</html>

<!-- ONLY showing changed parts to keep this readable -->

<script>
const API = "http://localhost:8000"; // force correct backend

let currentOwner = 'tiya_001';
let allTasks = [];

/* ---------------- INIT ---------------- */
window.onload = () => {
  document.getElementById('f-owner').value = currentOwner; // 🔥 FIX
  loadAll();
};

/* ---------------- CREATE ---------------- */
async function createTask() {
  const title = document.getElementById('f-title').value.trim();
  const owner = document.getElementById('f-owner').value.trim();
  const deadline = document.getElementById('f-deadline').value;

  if (!title || !owner || !deadline) {
    toast("Fill all required fields", "error");
    return;
  }

  // 🔥 FIX reminders parsing
  const remindersRaw = document.getElementById('f-reminders').value;
  const reminders = remindersRaw
    .split(',')
    .map(x => parseInt(x.trim()))
    .filter(x => !isNaN(x));

  const res = await apiFetch('POST', '/tasks', {
    title,
    owner_id: owner,
    deadline: new Date(deadline).toISOString(),
    priority: document.getElementById('f-priority').value,
    reminder_minutes_before: reminders,
    description: document.getElementById('f-desc').value,
    tags: document.getElementById('f-tags').value
  });

  if (!res) return;

  allTasks.unshift(res);
  closeCreateModal();
  toast("Task created", "success");

  loadTasks(); // 🔥 force refresh
}

/* ---------------- RENDER TASKS (FIXED UI) ---------------- */
function filterTasks() {
  const el = document.getElementById('tasks-list');

  if (!allTasks.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📝</div>
      <div>No tasks yet</div>
    </div>`;
    return;
  }

  el.innerHTML = allTasks.map(t => `
    <div class="task-card ${t.status === 'completed' ? 'completed' : ''}">
      
      <div class="task-top">
        <div class="task-name">${esc(t.title)}</div>
        <div class="task-badges">
          <span class="badge badge-${t.status}">${t.status}</span>
          <span class="badge badge-${t.priority}">${t.priority}</span>
        </div>
      </div>

      <div class="task-meta">
        <div>📅 ${new Date(t.deadline).toLocaleString()}</div>
      </div>

      ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}

      <div class="task-actions">
        ${t.status !== 'completed' ? `
          <button class="btn btn-success btn-sm" onclick="completeTask('${t.id}')">Complete</button>
        ` : ''}

        <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">Delete</button>
      </div>

    </div>
  `).join('');
}

/* ---------------- MODAL FIX ---------------- */
function openCreateModal() {
  document.getElementById('create-modal').classList.add('open');

  // 🔥 auto-fill owner every time
  document.getElementById('f-owner').value = currentOwner;
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('open');

  // 🔥 reset form
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-deadline').value = '';
  document.getElementById('f-tags').value = '';
}

/* ---------------- LOAD ---------------- */
async function loadTasks() {
  const data = await apiFetch(
    'GET',
    `/tasks?owner_id=${encodeURIComponent(currentOwner)}&page_size=100`
  );

  if (!data) return;

  allTasks = data.tasks || [];

  updateMetrics();
  renderRecent();
  filterTasks();
}
</script>

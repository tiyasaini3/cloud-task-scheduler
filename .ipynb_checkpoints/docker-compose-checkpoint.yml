version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: taskdb
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: taskredis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: taskapi
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@postgres:5432/taskdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_QUEUE_NAME: reminders
      QUEUE_BACKEND: redis
      STORAGE_BACKEND: local
      LOCAL_LOG_DIR: /tmp/task_logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - task_logs:/tmp/task_logs
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: taskworker
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@postgres:5432/taskdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_QUEUE_NAME: reminders
      QUEUE_BACKEND: redis
      STORAGE_BACKEND: local
      LOCAL_LOG_DIR: /tmp/task_logs
      WORKER_POLL_INTERVAL: "2"
      WORKER_MAX_RETRIES: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - task_logs:/tmp/task_logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  task_logs: 